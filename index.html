<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Alirio Castaneda – Graphic Designer | Digital & Print Specialist at TESO Graphics" />
  <title>TESO Graphics – Alirio Castaneda</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <main class="card-wrapper">
    <div class="card">

      <!-- ── HERO ── -->
      <section class="hero">
        <div class="logo-badge">
          <span class="logo-teso">TESO</span>
          <span class="logo-graphics">GRAPHICS<span class="logo-dot">.</span><span class="logo-com">com</span></span>
        </div>
      </section>

      <!-- ── NAME & TITLE ── -->
      <section class="identity">
        <div class="identity-inner">
          <p class="label">Graphic Designer</p>
          <h1 class="name">Alirio<br/>Castaneda</h1>
          <p class="speciality">Digital &amp; Print Specialist</p>
        </div>
        <div class="identity-accent"></div>
      </section>

      <!-- ── TAGLINE ── -->
      <section class="tagline-section">
        <p class="tagline">"Bold Design for<br/><em>Digital &amp; Print Worlds</em>"</p>
      </section>

      <!-- ── DIVIDER ── -->
      <div class="divider"></div>

      <!-- ── CONTACT ── -->
      <section class="contact">
        <a class="contact-item" href="tel:+13035253023" aria-label="Call Alirio">
          <span class="contact-icon"><i data-lucide="phone"></i></span>
          <span class="contact-text">(303) 525 3023</span>
        </a>
        <a class="contact-item" href="mailto:studio@tesographics.com" aria-label="Email Alirio">
          <span class="contact-icon"><i data-lucide="mail"></i></span>
          <span class="contact-text">studio@tesographics.com</span>
        </a>
        <a class="contact-item" href="https://tesographics.com" target="_blank" rel="noopener" aria-label="Visit website">
          <span class="contact-icon"><i data-lucide="globe"></i></span>
          <span class="contact-text">tesographics.com</span>
        </a>
      </section>

      <!-- ── SAVE CONTACT ── -->
      <section class="cta-section">
        <button class="btn-save" id="saveContact" aria-label="Download vCard">
          <i data-lucide="user-plus"></i>
          <span>SAVE CONTACT</span>
        </button>
      </section>

    </div><!-- /.card -->
  </main>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <p>GET YOUR OWN DIGITAL BUSINESS CARD AT&nbsp;
      <a href="https://tesographics.com" target="_blank" rel="noopener">Tesographics.com</a>
    </p>
  </footer>

  <script src="js/script.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
